name: ✨ 功能建議 / Feature request
description: 提出新功能或改進想法 / Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        中英文皆可。 English or 中文 both welcome.
  - type: textarea
    id: problem
    attributes:
      label: 想解決的問題 / The problem you want solved
      description: 描述情境與痛點,而不只是解法 / Describe the scenario and pain, not just the solution
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的做法 / What you'd like to happen
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考慮過的替代方案 / Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: 相關領域 / Area
      options:
        - 會議 / Meetings
        - 目標與交付 / Goals & delivery
        - 知識庫與檢索 / Knowledge & retrieval
        - 記憶系統 / Memory
        - 像素辦公室 / Pixel office
        - 大腦與模型 / Brains & providers
        - 安裝與打包 / Install & packaging
        - i18n / 多語系
        - 其他 / Other
