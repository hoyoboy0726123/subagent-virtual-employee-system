name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 35 # hard backstop — never leave a 6-hour zombie
    strategy:
      matrix:
        node-version: ['22.x', '24.x']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # One STEP per suite, bounded by the RUNNER's step-level timeout — a
      # shell `timeout` proved unable to bound whatever hangs here (the loop
      # step outlived per-suite SIGKILL budgets), while the platform timeout
      # tears the step down unconditionally. continue-on-error lets every
      # suite report, and the Verdict step fails the job with names.
      - { id: s_tools,   name: smoke.tools,         timeout-minutes: 3, continue-on-error: true, run: node server/test/smoke.tools.mjs }
      - { id: s_sec,     name: smoke.security,      timeout-minutes: 3, continue-on-error: true, run: node server/test/smoke.security.mjs }
      - { id: s_cli,     name: smoke.cliRunner,     timeout-minutes: 3, continue-on-error: true, run: node server/test/smoke.cliRunner.mjs }
      - { id: s_emb,     name: smoke.embeddings,    timeout-minutes: 3, continue-on-error: true, run: node server/test/smoke.embeddings.mjs }
      - { id: s_mem,     name: smoke.memory,        timeout-minutes: 3, continue-on-error: true, run: node server/test/smoke.memory.mjs }
      - { id: s_prov,    name: smoke.providers,     timeout-minutes: 3, continue-on-error: true, run: node server/test/smoke.providers.mjs }
      - { id: s_orch,    name: smoke.orchestration, timeout-minutes: 3, continue-on-error: true, run: node server/test/smoke.orchestration.mjs }
      - { id: s_http,    name: smoke.http,          timeout-minutes: 5, continue-on-error: true, run: node server/test/smoke.mjs }

      - name: Verdict
        run: |
          fail=0
          check() { if [ "$2" != "success" ]; then echo "✗ $1 → $2"; fail=1; else echo "✓ $1"; fi; }
          check smoke.tools         "${{ steps.s_tools.outcome }}"
          check smoke.security      "${{ steps.s_sec.outcome }}"
          check smoke.cliRunner     "${{ steps.s_cli.outcome }}"
          check smoke.embeddings    "${{ steps.s_emb.outcome }}"
          check smoke.memory        "${{ steps.s_mem.outcome }}"
          check smoke.providers     "${{ steps.s_prov.outcome }}"
          check smoke.orchestration "${{ steps.s_orch.outcome }}"
          check smoke.http          "${{ steps.s_http.outcome }}"
          exit $fail

      - name: Build client
        run: npm run build

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - run: npm run lint
