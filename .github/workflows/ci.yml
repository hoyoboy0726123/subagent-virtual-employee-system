name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # hard backstop — never leave a 6-hour zombie
    strategy:
      matrix:
        node-version: ['22.x', '24.x']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # Sanity probes: prove that node runs, that `timeout` can kill it, and
      # that a bare import of the app module returns. Each is tiny and bounded.
      - name: Probe environment
        run: |
          set +e  # probes report rc themselves; expected non-zero must not kill the step
          echo "— probe 1: node runs —"
          node -e "console.log('node ok', process.version)"
          echo "— probe 2: timeout kills a sleeping node (expect rc=124) —"
          timeout -k 5 10 node -e "setTimeout(()=>{},1e9)" </dev/null >/dev/null 2>&1
          echo "rc=$?"
          echo "— probe 3: import the app (DB in memory) —"
          timeout -k 5 60 node -e "process.env.DB_FILE=':memory:'; const t=Date.now(); import('./server/src/app.js').then(()=>{console.log('app import ok in', Date.now()-t, 'ms'); process.exit(0);})" </dev/null
          echo "rc=$?"
          exit 0

      # One suite, bounded, with a JS-stack diagnostic if it never exits:
      # SIGUSR2 makes node write a report (full JS stack) before we SIGKILL.
      - name: Test (diagnose smoke.tools)
        run: |
          node --report-on-signal --report-signal=SIGUSR2 --report-directory=/tmp \
            server/test/smoke.tools.mjs > /tmp/suite.log 2>&1 < /dev/null &
          pid=$!
          for i in $(seq 1 60); do kill -0 $pid 2>/dev/null || break; sleep 1; done
          if kill -0 $pid 2>/dev/null; then
            echo "✗ smoke.tools still alive after 60s — dumping JS stack"
            kill -USR2 $pid; sleep 3
            for r in /tmp/report.*.json; do
              echo "== $r (javascript stack) =="
              node -e "const j=require('$r'); console.log(JSON.stringify(j.javascriptStack, null, 1)); console.log('libuv handles:', JSON.stringify((j.libuv||[]).map(h=>h.type+':'+(h.is_active?'active':'idle'))))" || true
            done
            kill -9 $pid 2>/dev/null
            cat /tmp/suite.log
            exit 1
          fi
          wait $pid; rc=$?
          cat /tmp/suite.log
          echo "smoke.tools exited rc=$rc"
          exit $rc

      - name: Test (remaining suites)
        run: |
          rc_total=0
          for f in security cliRunner embeddings memory providers orchestration mjs; do
            file="server/test/smoke.$f.mjs"; [ "$f" = "mjs" ] && file="server/test/smoke.mjs"
            echo "══════ $file ══════"
            timeout -k 5 120 node "$file" > /tmp/suite.log 2>&1 < /dev/null; rc=$?
            cat /tmp/suite.log
            if [ $rc -ne 0 ]; then echo "✗ $file exited rc=$rc$([ $rc -eq 124 ] && echo ' (TIMED OUT / never exited)')"; rc_total=1; fi
          done
          exit $rc_total

      - name: Build client
        run: npm run build

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - run: npm run lint
