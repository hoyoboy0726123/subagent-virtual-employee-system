name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22.x', '24.x']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # Hermetic: no API keys, no network, no external services.
      # Suites run one-by-one under `timeout` so a suite that passes its checks
      # but never exits (stray handle) fails LOUDLY as exit 124 with its name,
      # instead of hanging the job for 6 hours.
      - name: Test
        run: |
          set -e
          for f in security tools cliRunner embeddings memory providers orchestration; do
            echo "══════ smoke.$f ══════"
            timeout -k 5 180 node "server/test/smoke.$f.mjs"
          done
          echo "══════ smoke.mjs ══════"
          timeout -k 5 300 node server/test/smoke.mjs

      - name: Build client
        run: npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - run: npm run lint
