name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # hard backstop — never leave a 6-hour zombie
    permissions:
      contents: write # the diagnostic watchdog pushes findings to a diag branch
    strategy:
      matrix:
        node-version: ['22.x', '24.x']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # Watchdog script: capture the crime scene (process tree, per-suite
      # progress, suite log, JS stacks via SIGUSR2), push it to a ci-diag
      # branch (independent of Actions log publishing), then SIGKILL stray
      # node processes so the blocked step can end. Launched INSIDE the Test
      # step (a detached cross-step process did not survive on this runner).
      - name: Write watchdog script
        run: |
          cat > /tmp/watchdog.sh <<'EOS'
          #!/bin/bash
          sleep 360
          D=/tmp/diag; mkdir -p $D
          date -u > $D/when.txt
          ps auxww --forest > $D/ps.txt 2>&1
          cp /tmp/progress.txt $D/ 2>/dev/null || true
          cp /tmp/suite.log $D/suite.log 2>/dev/null || true
          for pid in $(pgrep -f 'server/test/smoke' 2>/dev/null); do
            kill -USR2 $pid 2>/dev/null
          done
          sleep 4
          cp /tmp/report.*.json $D/ 2>/dev/null || true
          cd "$GITHUB_WORKSPACE"
          git config user.email ci@local; git config user.name ci-watchdog
          BR="ci-diag-${MATRIX_NODE//./_}"
          git checkout -B "$BR" >/dev/null 2>&1
          mkdir -p ci-diag && cp -r $D/. ci-diag/ 2>/dev/null
          git add -f ci-diag >/dev/null 2>&1 && git commit -m "watchdog diagnostics" -q
          git push -f origin "$BR" > $D/push.txt 2>&1
          # unblock the hung harness so the job can finish and publish logs
          pkill -9 -f 'server/test/smoke' 2>/dev/null
          exit 0
          EOS
          chmod +x /tmp/watchdog.sh
          echo ok

      # Staged probes: pinpoint WHICH phase hangs on this runner. Each runs in
      # the background with a hard kill — this harness pattern is the only one
      # proven to terminate here (step-level timeout-minutes did not).
      - name: Probe app phases
        run: |
          probe() {
            local label="$1"; shift
            node --report-on-signal --report-signal=SIGUSR2 --report-directory=/tmp \
              -e "$1" > /tmp/probe.log 2>&1 < /dev/null &
            local pid=$!
            for i in $(seq 1 45); do kill -0 $pid 2>/dev/null || break; sleep 1; done
            if kill -0 $pid 2>/dev/null; then
              echo "✗ $label HUNG at 45s — JS stack:"
              kill -USR2 $pid; sleep 3
              for r in /tmp/report.*.json; do
                [ -f "$r" ] || continue
                node -e "const j=require('$r'); console.log(JSON.stringify(j.javascriptStack,null,1)); console.log('libuv:', (j.libuv||[]).filter(h=>h.is_active).map(h=>h.type).join(','))" 2>/dev/null || true
                rm -f "$r"
              done
              kill -9 $pid 2>/dev/null; cat /tmp/probe.log; return 1
            fi
            wait $pid; local rc=$?
            cat /tmp/probe.log
            echo "· $label rc=$rc"
            return $rc
          }
          set -e
          probe "createApp" "process.env.DB_FILE=':memory:'; import('./server/src/app.js').then(m=>{console.log('import ok'); m.createApp(); console.log('createApp ok'); setTimeout(()=>process.exit(0),300);})"
          probe "listen+fetch" "process.env.DB_FILE=':memory:'; import('./server/src/app.js').then(async (m)=>{const app=m.createApp(); const s=app.listen(0,'127.0.0.1',async()=>{const base='http://127.0.0.1:'+s.address().port; const r=await fetch(base+'/api/health'); await r.arrayBuffer(); console.log('fetch ok', r.status); s.close(); setTimeout(()=>process.exit(0),300);});})"

      # All suites through the same proven bounded harness, with a JS-stack
      # dump for anything that never exits. Every suite reports; job fails at
      # the end listing offenders.
      - name: Test
        env:
          MATRIX_NODE: ${{ matrix.node-version }}
        run: |
          /tmp/watchdog.sh & WD=$!   # fires at +6min if we're still stuck
          run_suite() {
            local file="$1"
            echo "══════ $file ══════"
            node --report-on-signal --report-signal=SIGUSR2 --report-directory=/tmp \
              "$file" > /tmp/suite.log 2>&1 < /dev/null &
            local pid=$!
            for i in $(seq 1 90); do kill -0 $pid 2>/dev/null || break; sleep 1; done
            if kill -0 $pid 2>/dev/null; then
              echo "✗ $file STILL RUNNING at 90s — JS stack:"
              kill -USR2 $pid; sleep 3
              for r in /tmp/report.*.json; do
                [ -f "$r" ] || continue
                node -e "const j=require('$r'); console.log(JSON.stringify(j.javascriptStack,null,1)); console.log('libuv:', (j.libuv||[]).filter(h=>h.is_active).map(h=>h.type).join(','))" 2>/dev/null || true
                rm -f "$r"
              done
              kill -9 $pid 2>/dev/null
              cat /tmp/suite.log
              return 1
            fi
            wait $pid; local rc=$?
            cat /tmp/suite.log
            echo "· $file rc=$rc"
            return $rc
          }
          fail=0
          for f in server/test/smoke.tools.mjs server/test/smoke.security.mjs server/test/smoke.cliRunner.mjs server/test/smoke.embeddings.mjs server/test/smoke.memory.mjs server/test/smoke.providers.mjs server/test/smoke.orchestration.mjs server/test/smoke.mjs; do
            echo "START $f $(date -u +%H:%M:%S)" >> /tmp/progress.txt
            run_suite "$f" || { echo "✗✗ FAILED: $f"; fail=1; }
            echo "END   $f $(date -u +%H:%M:%S)" >> /tmp/progress.txt
          done
          kill $WD 2>/dev/null || true  # disarm the watchdog on a clean finish
          exit $fail

      - name: Build client
        run: npm run build

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - run: npm run lint
