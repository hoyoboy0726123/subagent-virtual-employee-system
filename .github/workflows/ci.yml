name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  # Primary gate: Windows — the project's first-class platform (the exe, the
  # one-click start.bat, the primary user base). The full hermetic suite runs
  # here and must pass.
  test:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - run: npm ci

      # Hermetic: no API keys, no network, no external services.
      - name: Test
        run: npm test

      - name: Build client
        run: npm run build

  # Advisory: Linux. The suites pass their checks, but on GitHub's ubuntu
  # runners the runner agent wedges mid-step while running them (step
  # timeouts stop being enforced, later steps never start, logs never
  # publish — see the tracking issue for the full investigation). Until that
  # is understood, this job is informational and never fails the workflow.
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - name: Test (advisory)
        continue-on-error: true
        run: npm test

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - run: npm run lint
