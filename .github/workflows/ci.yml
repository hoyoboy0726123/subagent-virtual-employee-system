name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  # Primary gate: Windows — the project's first-class platform (the exe, the
  # one-click start.bat, the primary user base). The full hermetic suite runs
  # here and must pass.
  test:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - run: npm ci

      # Hermetic: no API keys, no network, no external services.
      - name: Test
        run: npm test

      - name: Build client
        run: npm run build

  # NOTE(Linux): the suites pass their checks everywhere, but on GitHub's
  # ubuntu runners the runner agent wedges mid-step while executing the HTTP
  # suites (step timeouts stop being enforced, later steps never start, logs
  # never publish). Even an advisory continue-on-error job drags the run
  # conclusion to 'cancelled' when its own timeout reaps it — so there is no
  # Linux test job until the wedge is understood. Platform support is
  # documented in the README; the app itself runs fine on Linux.

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - run: npm run lint
