name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22.x', '24.x']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # Hermetic: no API keys, no network, no external services.
      # Each suite runs under `timeout` with stdio redirected to a FILE:
      #   • a suite whose process never exits fails loudly as rc=124 with its
      #     name, instead of hanging the job for 6 hours;
      #   • a LEAKED grandchild process can only hold the log-file descriptor,
      #     not the runner's step pipe — so the step can actually end (a
      #     pipe-holding orphan is the classic Actions forever-hang).
      - name: Test
        run: |
          rc_total=0
          for f in security tools cliRunner embeddings memory providers orchestration mjs; do
            file="server/test/smoke.$f.mjs"; [ "$f" = "mjs" ] && file="server/test/smoke.mjs"
            echo "══════ $file ══════"
            timeout -k 5 180 node "$file" > /tmp/suite.log 2>&1 < /dev/null; rc=$?
            cat /tmp/suite.log
            if [ $rc -ne 0 ]; then echo "✗ $file exited rc=$rc$([ $rc -eq 124 ] && echo ' (TIMED OUT / never exited)')"; rc_total=1; fi
          done
          exit $rc_total

      - name: Build client
        run: npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - run: npm run lint
