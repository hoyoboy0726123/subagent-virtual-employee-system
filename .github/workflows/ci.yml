name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # hard backstop — never leave a 6-hour zombie
    strategy:
      matrix:
        node-version: ['22.x', '24.x']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      # Staged probes: pinpoint WHICH phase hangs on this runner. Each runs in
      # the background with a hard kill — this harness pattern is the only one
      # proven to terminate here (step-level timeout-minutes did not).
      - name: Probe app phases
        run: |
          probe() {
            local label="$1"; shift
            node --report-on-signal --report-signal=SIGUSR2 --report-directory=/tmp \
              -e "$1" > /tmp/probe.log 2>&1 < /dev/null &
            local pid=$!
            for i in $(seq 1 45); do kill -0 $pid 2>/dev/null || break; sleep 1; done
            if kill -0 $pid 2>/dev/null; then
              echo "✗ $label HUNG at 45s — JS stack:"
              kill -USR2 $pid; sleep 3
              for r in /tmp/report.*.json; do
                [ -f "$r" ] || continue
                node -e "const j=require('$r'); console.log(JSON.stringify(j.javascriptStack,null,1)); console.log('libuv:', (j.libuv||[]).filter(h=>h.is_active).map(h=>h.type).join(','))" 2>/dev/null || true
                rm -f "$r"
              done
              kill -9 $pid 2>/dev/null; cat /tmp/probe.log; return 1
            fi
            wait $pid; local rc=$?
            cat /tmp/probe.log
            echo "· $label rc=$rc"
            return $rc
          }
          set -e
          probe "createApp" "process.env.DB_FILE=':memory:'; import('./server/src/app.js').then(m=>{console.log('import ok'); m.createApp(); console.log('createApp ok'); setTimeout(()=>process.exit(0),300);})"
          probe "listen+fetch" "process.env.DB_FILE=':memory:'; import('./server/src/app.js').then(async (m)=>{const app=m.createApp(); const s=app.listen(0,'127.0.0.1',async()=>{const base='http://127.0.0.1:'+s.address().port; const r=await fetch(base+'/api/health'); await r.arrayBuffer(); console.log('fetch ok', r.status); s.close(); setTimeout(()=>process.exit(0),300);});})"

      # All suites through the same proven bounded harness, with a JS-stack
      # dump for anything that never exits. Every suite reports; job fails at
      # the end listing offenders.
      - name: Test
        run: |
          run_suite() {
            local file="$1"
            echo "══════ $file ══════"
            node --report-on-signal --report-signal=SIGUSR2 --report-directory=/tmp \
              "$file" > /tmp/suite.log 2>&1 < /dev/null &
            local pid=$!
            for i in $(seq 1 90); do kill -0 $pid 2>/dev/null || break; sleep 1; done
            if kill -0 $pid 2>/dev/null; then
              echo "✗ $file STILL RUNNING at 90s — JS stack:"
              kill -USR2 $pid; sleep 3
              for r in /tmp/report.*.json; do
                [ -f "$r" ] || continue
                node -e "const j=require('$r'); console.log(JSON.stringify(j.javascriptStack,null,1)); console.log('libuv:', (j.libuv||[]).filter(h=>h.is_active).map(h=>h.type).join(','))" 2>/dev/null || true
                rm -f "$r"
              done
              kill -9 $pid 2>/dev/null
              cat /tmp/suite.log
              return 1
            fi
            wait $pid; local rc=$?
            cat /tmp/suite.log
            echo "· $file rc=$rc"
            return $rc
          }
          fail=0
          for f in server/test/smoke.tools.mjs server/test/smoke.security.mjs server/test/smoke.cliRunner.mjs server/test/smoke.embeddings.mjs server/test/smoke.memory.mjs server/test/smoke.providers.mjs server/test/smoke.orchestration.mjs server/test/smoke.mjs; do
            run_suite "$f" || { echo "✗✗ FAILED: $f"; fail=1; }
          done
          exit $fail

      - name: Build client
        run: npm run build

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - run: npm run lint
